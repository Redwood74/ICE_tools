name: CI – lint and test

on:
  push:
    branches: ["main", "copilot/**"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
          pip install -e .

      - name: Lint (ruff)
        run: |
          ruff check src/ tests/
          ruff format --check src/ tests/

      - name: Run tests (no live ICE queries)
        run: pytest -m "not live" --tb=short

  # Live tests are intentionally excluded from CI.
  # They require a live ICE site connection and valid A-number,
  # which cannot be safely provided in CI. Run manually:
  #   pytest -m live
